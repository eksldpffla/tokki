<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>eksldpffla</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0c0d;
      --card:     #141416;
      --border:   rgba(255,255,255,0.06);
      --border-h: rgba(255,255,255,0.14);
      --text:     #ebebeb;
      --muted:    #555;
      --accent:   #c8ff57;
      --r:        20px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.6;
    }

    /* ── Loading screen ── */
    #loadScreen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 10000; transition: opacity 0.4s;
    }
    #loadScreen.done { opacity: 0; pointer-events: none; }
    .load-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted); margin: 0 3px;
      display: inline-block;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .load-dot:nth-child(2) { animation-delay: 0.2s; }
    .load-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100%{transform:scale(0.6);opacity:0.3} 40%{transform:scale(1);opacity:1} }

    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 90px 28px 140px;
    }

    /* ── Hero ── */
    .hero { margin-bottom: 80px; animation: up 0.7s cubic-bezier(.22,1,.36,1) both; }

    .name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(48px, 8.5vw, 88px);
      font-weight: 800;
      line-height: 0.93;
      letter-spacing: -0.04em;
      margin-bottom: 28px;
      outline: none;
      display: block;
      color: var(--text);
    }
    .name[contenteditable="true"] {
      border-bottom: 1px solid rgba(200,255,87,0.35);
      cursor: text;
    }

    .bio {
      font-size: 15px; line-height: 1.8;
      color: var(--muted); max-width: 420px;
      font-weight: 300; outline: none;
    }
    .bio[contenteditable="true"] {
      color: var(--text);
      border-bottom: 1px solid rgba(200,255,87,0.35);
      padding-bottom: 2px; cursor: text;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      animation: up 0.7s cubic-bezier(.22,1,.36,1) 0.1s both;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 26px 24px;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: border-color 0.3s, transform 0.35s cubic-bezier(.22,1,.36,1), box-shadow 0.35s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      animation: cardIn 0.4s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.94) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .card:hover {
      border-color: var(--border-h);
      transform: translateY(-4px);
      box-shadow: 0 18px 50px rgba(0,0,0,0.45);
    }
    body.editing .card:hover { transform: none; box-shadow: none; }

    .card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(120deg, transparent 35%, rgba(255,255,255,0.03) 50%, transparent 65%);
      transform: translateX(-120%); transition: transform 0.55s ease;
    }
    .card:hover::before { transform: translateX(120%); }

    .card-spot {
      position: absolute; inset: 0;
      background: radial-gradient(circle 120px at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.03) 0%, transparent 100%);
      opacity: 0; transition: opacity 0.3s;
      border-radius: inherit; pointer-events: none;
    }
    .card:hover .card-spot { opacity: 1; }

    .card-label {
      font-family: 'Syne', sans-serif;
      font-size: 17px; font-weight: 700;
      letter-spacing: -0.02em; color: var(--text);
    }

    .card-remove {
      position: absolute; top: 12px; right: 12px;
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(255,80,80,0.12);
      border: 1px solid rgba(255,80,80,0.25);
      color: rgba(255,100,100,0.8);
      font-size: 14px; line-height: 1; cursor: pointer;
      display: none; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s; z-index: 10;
    }
    .card-remove:hover { background: rgba(255,80,80,0.25); color: #fff; }
    body.editing .card-remove { display: flex; }

    /* ── Add card ── */
    .card-add {
      background: transparent;
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: var(--r); padding: 26px 24px;
      cursor: pointer; display: none;
      align-items: center; justify-content: center; gap: 8px;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 13px; letter-spacing: 0.04em;
      transition: border-color 0.25s, color 0.25s, background 0.25s;
    }
    .card-add:hover {
      border-color: rgba(200,255,87,0.3);
      color: var(--accent); background: rgba(200,255,87,0.03);
    }
    body.editing .card-add { display: flex; }

    /* Ripple */
    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.05);
      transform: scale(0); animation: ripple 0.6s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ripple { to { transform: scale(5); opacity: 0; } }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: #111113;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 26px; padding: 40px 36px 36px;
      max-width: 460px; width: 100%; position: relative;
      transform: translateY(16px) scale(0.96);
      transition: transform 0.35s cubic-bezier(.22,1,.36,1);
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .overlay.open .modal { transform: translateY(0) scale(1); }

    .modal-x {
      position: absolute; top: 16px; right: 16px;
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .modal-x:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 26px; font-weight: 800;
      letter-spacing: -0.03em; margin-bottom: 16px; outline: none;
    }
    .modal-title[contenteditable="true"] {
      border-bottom: 1px solid rgba(200,255,87,0.3);
      padding-bottom: 2px; cursor: text;
    }

    .modal-body {
      font-size: 14px; line-height: 1.8;
      color: var(--muted); font-weight: 300; outline: none; min-height: 56px;
    }
    .modal-body[contenteditable="true"] {
      color: var(--text);
      border-bottom: 1px solid rgba(200,255,87,0.3);
      padding-bottom: 4px; cursor: text;
    }

    .modal-edit-note {
      margin-top: 18px; font-size: 10px; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(200,255,87,0.35); display: none;
    }
    body.editing .modal-edit-note { display: block; }

    .modal-save {
      margin-top: 22px; width: 100%;
      background: var(--accent); color: #0c0c0d;
      border: none; border-radius: 12px; padding: 12px;
      font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s; display: none;
    }
    .modal-save:hover { opacity: 0.82; }

    /* ── Password overlay ── */
    .pw-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .pw-overlay.open { opacity: 1; pointer-events: all; }

    .pw-box {
      background: #111113; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px; padding: 32px 28px;
      max-width: 320px; width: 100%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      transform: scale(0.95); transition: transform 0.3s cubic-bezier(.22,1,.36,1);
    }
    .pw-overlay.open .pw-box { transform: scale(1); }

    .pw-label { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .pw-sub   { font-size: 12px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }

    .pw-input {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
      padding: 11px 14px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      outline: none; margin-bottom: 12px; transition: border-color 0.2s;
    }
    .pw-input:focus { border-color: rgba(200,255,87,0.35); }
    .pw-input.err   { border-color: rgba(255,80,80,0.45); animation: shake 0.3s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

    .pw-go {
      width: 100%; background: var(--accent); color: #0c0c0d;
      border: none; border-radius: 10px; padding: 11px;
      font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s;
    }
    .pw-go:hover { opacity: 0.82; }

    .pw-dismiss {
      display: block; text-align: center; margin-top: 10px;
      font-size: 12px; color: var(--muted); cursor: pointer; transition: color 0.2s;
    }
    .pw-dismiss:hover { color: var(--text); }

    /* ── Setup overlay (first time config) ── */
    .setup-note {
      margin-top: 16px; font-size: 11px; line-height: 1.6;
      color: var(--muted); border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 14px;
    }
    .setup-note a { color: var(--accent); text-decoration: none; }
    .setup-note a:hover { text-decoration: underline; }
    .setup-input {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
      padding: 10px 14px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      outline: none; margin-top: 8px; transition: border-color 0.2s;
    }
    .setup-input:focus { border-color: rgba(200,255,87,0.35); }

    /* ── Edit indicator ── */
    .edit-indicator {
      position: fixed; bottom: 24px; right: 24px;
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent); opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      display: flex; align-items: center; gap: 6px; z-index: 50;
    }
    .edit-indicator::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 8px var(--accent);
    }
    body.editing .edit-indicator { opacity: 1; pointer-events: all; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #1e1e20; border: 1px solid rgba(255,255,255,0.1);
      color: var(--accent); font-size: 12px; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 10px 20px; border-radius: 99px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s; z-index: 300;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 99px; }

    @media (max-width: 520px) {
      main { padding: 64px 20px 120px; }
      .grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .card, .card-add { padding: 22px 18px; }
      .modal { padding: 32px 22px 28px; }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loadScreen">
  <span class="load-dot"></span>
  <span class="load-dot"></span>
  <span class="load-dot"></span>
</div>

<main>
  <section class="hero">
    <div class="name"  id="nameEl"  spellcheck="false"></div>
    <p    class="bio"  id="bioEl"   spellcheck="false"></p>
  </section>
  <div class="grid" id="grid">
    <button class="card-add" id="addBtn">
      <span style="width:18px;height:18px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">+</span>
      add hobby
    </button>
  </div>
</main>

<!-- Detail / new-card modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="modal-x" id="modalX">×</button>
    <div class="modal-title" id="modalTitle" spellcheck="false"></div>
    <div class="modal-body"  id="modalBody"  spellcheck="false"></div>
    <div class="modal-edit-note">editing — changes save on close</div>
    <button class="modal-save" id="modalSave">Add hobby</button>
  </div>
</div>

<!-- Password prompt -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <div class="pw-label">Edit mode</div>
    <div class="pw-sub" id="pwSub">Enter your password to unlock editing.</div>
    <input class="pw-input" type="password" id="pwInput" placeholder="Password" autocomplete="off"/>
    <div id="pwInput2Wrap" style="display:none">
      <input class="pw-input" type="password" id="pwInput2" placeholder="New password" autocomplete="off"/>
    </div>
    <button class="pw-go" id="pwGo">Unlock</button>
    <span class="pw-dismiss" id="pwDismiss">Cancel</span>

    <!-- JSONBin setup (shown first time) -->
    <div class="setup-note" id="setupNote" style="display:none">
      <strong style="color:var(--text)">One-time setup needed.</strong><br>
      To save changes globally, paste your <a href="https://jsonbin.io" target="_blank">JSONBin.io</a> Master Key and Bin ID below.<br>
      <a href="https://jsonbin.io/app/bins" target="_blank">Get them here →</a>
      <input class="setup-input" id="setupKey" placeholder="Master Key (X-Master-Key)" autocomplete="off"/>
      <input class="setup-input" id="setupBin" placeholder="Bin ID" autocomplete="off" style="margin-top:6px"/>
      <button class="pw-go" id="setupSave" style="margin-top:10px">Save &amp; unlock</button>
    </div>
  </div>
</div>

<!-- Edit indicator -->
<div class="edit-indicator" id="editIndicator">
  <span style="cursor:pointer" onclick="exitEdit()">exit editing</span>
  <span style="opacity:0.3;margin:0 2px">·</span>
  <span style="cursor:pointer;opacity:0.6;font-size:10px" onclick="openPw('change')">change password</span>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
//  SETTINGS — edit these after setup
// ═══════════════════════════════════════════════════
const DEFAULT_PASSWORD = '41149512';

// JSONBin credentials — fill these in after creating your bin
// OR leave blank and enter them via the in-site setup prompt
let JSONBIN_KEY = '';   // e.g. '$2a$10$...'
let JSONBIN_BIN = '';   // e.g. '665a1234abc...'
// ═══════════════════════════════════════════════════

const JSONBIN_URL = () => `https://api.jsonbin.io/v3/b/${JSONBIN_BIN}`;

// ── Default content ──
const DEFAULTS = {
  name:    'eksldpffla',
  bio:     "I'm a curious human living somewhere on Earth. I build things, break things, and find beauty in the gaps between.",
  hobbies: [
    { id:'photography', label:'Photography', desc:'I love capturing fleeting moments — golden hour light, candid street life, the quiet geometry of everyday spaces.' },
    { id:'music',       label:'Music',       desc:'Deep-diving into obscure genres is my cardio. I produce lo-fi beats and maintain a sprawling playlist for every mood.' },
    { id:'coding',      label:'Coding',      desc:"I tinker with side projects for fun — websites, little tools, CLI apps. There's something meditative about making something from nothing." },
    { id:'reading',     label:'Reading',     desc:"Science fiction and philosophy are my two obsessions. Currently working through Ursula K. Le Guin's back catalog." },
    { id:'gaming',      label:'Gaming',      desc:"Story-rich RPGs are my comfort food. I'm drawn to worlds with real lore and moral weight." },
    { id:'travel',      label:'Travel',      desc:'Not the tourist-trail kind — I prefer getting off the map, eating street food, and spending too long in local bookshops.' },
  ]
};

// ── Credentials stored locally (only you set these up once) ──
function getKey() { return JSONBIN_KEY || localStorage.getItem('jb_key') || ''; }
function getBin() { return JSONBIN_BIN || localStorage.getItem('jb_bin') || ''; }
function saveCredentials(k, b) {
  JSONBIN_KEY = k; JSONBIN_BIN = b;
  localStorage.setItem('jb_key', k);
  localStorage.setItem('jb_bin', b);
}
function hasCredentials() { return getKey() && getBin(); }

// ── Password ──
function getPassword() { return localStorage.getItem('site_password') || DEFAULT_PASSWORD; }
function setPassword(p) { localStorage.setItem('site_password', p); }

// ── State ──
let siteData = null;   // { name, bio, hobbies }
let editing   = false;
let currentIdx = null;
let isNewCard  = false;

// ── DOM ──
const nameEl      = document.getElementById('nameEl');
const bioEl       = document.getElementById('bioEl');
const grid        = document.getElementById('grid');
const addBtn      = document.getElementById('addBtn');
const overlay     = document.getElementById('overlay');
const modalTitle  = document.getElementById('modalTitle');
const modalBody   = document.getElementById('modalBody');
const modalSave   = document.getElementById('modalSave');
const pwOverlay   = document.getElementById('pwOverlay');
const pwInput     = document.getElementById('pwInput');
const pwInput2    = document.getElementById('pwInput2');
const pwInput2Wrap= document.getElementById('pwInput2Wrap');
const pwSub       = document.getElementById('pwSub');
const pwGo        = document.getElementById('pwGo');
const setupNote   = document.getElementById('setupNote');

// ── Fetch data from JSONBin ──
async function fetchData() {
  if (!hasCredentials()) return null;
  try {
    const res = await fetch(JSONBIN_URL() + '/latest', {
      headers: {
        'X-Master-Key': getKey(),
        'X-Bin-Meta': 'false',
        'Cache-Control': 'no-cache'
      }
    });
    if (!res.ok) return null;
    const json = await res.json();
    // JSONBin wraps in { record: {...} } — unwrap it
    const data = (json && json.record !== undefined) ? json.record : json;
    if (data && data.hobbies) return data;
    return null;
  } catch { return null; }
}

// ── Push data to JSONBin ──
async function pushData(data) {
  if (!hasCredentials()) return false;
  try {
    const res = await fetch(JSONBIN_URL(), {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': getKey(),
        'X-Bin-Versioning': 'false'
      },
      body: JSON.stringify(data)
    });
    if (!res.ok) {
      const err = await res.text();
      console.error('JSONBin push failed:', res.status, err);
      return false;
    }
    return true;
  } catch(e) { console.error('JSONBin push error:', e); return false; }
}

// ── Render page from siteData ──
function render() {
  nameEl.textContent = siteData.name;
  bioEl.textContent  = siteData.bio;
  renderCards();
}

function renderCards() {
  grid.querySelectorAll('.card').forEach(c => c.remove());
  siteData.hobbies.forEach((h, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-spot"></div>
      <div class="card-label">${h.label}</div>
      <button class="card-remove" title="Remove">×</button>
    `;
    const spot = card.querySelector('.card-spot');
    card.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect();
      spot.style.setProperty('--mx', ((e.clientX-r.left)/r.width*100)+'%');
      spot.style.setProperty('--my', ((e.clientY-r.top)/r.height*100)+'%');
    });
    card.addEventListener('click', e => {
      if (e.target.closest('.card-remove')) return;
      const rp = document.createElement('span');
      rp.className = 'ripple';
      const rc = card.getBoundingClientRect();
      const sz = Math.max(rc.width, rc.height) * 1.4;
      rp.style.cssText = `width:${sz}px;height:${sz}px;left:${e.clientX-rc.left-sz/2}px;top:${e.clientY-rc.top-sz/2}px`;
      card.appendChild(rp);
      rp.addEventListener('animationend', () => rp.remove());
      openModal(i, false);
    });
    card.querySelector('.card-remove').addEventListener('click', e => {
      e.stopPropagation();
      siteData.hobbies.splice(i, 1);
      saveAndRender();
    });
    grid.insertBefore(card, addBtn);
  });
}

async function saveAndRender() {
  renderCards();
  const ok = await pushData(siteData);
  showToast(ok ? 'Saved' : 'Saved locally only — check credentials');
}

// ── Modal ──
function openModal(idx, isNew) {
  currentIdx = idx; isNewCard = isNew;
  if (isNew) {
    modalTitle.textContent = 'Hobby name';
    modalBody.textContent  = 'Write something about it…';
    modalTitle.contentEditable = 'true';
    modalBody.contentEditable  = 'true';
    modalSave.style.display    = 'block';
  } else {
    const h = siteData.hobbies[idx];
    modalTitle.textContent = h.label;
    modalBody.textContent  = h.desc;
    modalTitle.contentEditable = editing ? 'true' : 'false';
    modalBody.contentEditable  = editing ? 'true' : 'false';
    modalSave.style.display    = 'none';
  }
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

async function closeModal() {
  if (!isNewCard && currentIdx !== null && editing) {
    siteData.hobbies[currentIdx].label = modalTitle.textContent.trim() || siteData.hobbies[currentIdx].label;
    siteData.hobbies[currentIdx].desc  = modalBody.textContent.trim()  || siteData.hobbies[currentIdx].desc;
    await saveAndRender();
  }
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  modalTitle.contentEditable = 'false';
  modalBody.contentEditable  = 'false';
  modalSave.style.display    = 'none';
  currentIdx = null; isNewCard = false;
}

document.getElementById('modalX').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

modalSave.addEventListener('click', async () => {
  const label = modalTitle.textContent.trim();
  if (!label || label === 'Hobby name') return;
  siteData.hobbies.push({ id: 'h_' + Date.now(), label, desc: modalBody.textContent.trim() });
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  modalTitle.contentEditable = 'false';
  modalBody.contentEditable  = 'false';
  modalSave.style.display    = 'none';
  currentIdx = null; isNewCard = false;
  await saveAndRender();
});

addBtn.addEventListener('click', () => openModal(null, true));

// ── Edit mode ──
function enterEdit() {
  editing = true;
  document.body.classList.add('editing');
  nameEl.contentEditable = 'true';
  bioEl.contentEditable  = 'true';
}
async function exitEdit() {
  editing = false;
  document.body.classList.remove('editing');
  nameEl.contentEditable = 'false';
  bioEl.contentEditable  = 'false';
  siteData.name = nameEl.textContent.trim() || siteData.name;
  siteData.bio  = bioEl.textContent.trim()  || siteData.bio;
  await closeModal();
  const ok = await pushData(siteData);
  showToast(ok ? 'Changes saved for everyone!' : 'Saved locally only — check credentials');
}

// ── Secret combo: hold Ctrl → press E then D then T ──
// Fallback: press E ten times within 3s
const COMBO = ['e','d','t'];
let comboIdx = 0, comboTimer = null, tapTimes = [];

function resetCombo() { comboIdx = 0; }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { if(editing) exitEdit(); closePw(); closeModal(); return; }
  if (editing) return;

  if (e.ctrlKey) {
    const k = e.key.toLowerCase();
    if (k === COMBO[comboIdx]) {
      e.preventDefault();
      comboIdx++;
      clearTimeout(comboTimer);
      comboTimer = setTimeout(resetCombo, 2000);
      if (comboIdx === COMBO.length) { resetCombo(); openPw('unlock'); }
    } else if (k !== 'control') { resetCombo(); }
  } else {
    resetCombo();
    if (e.key.toLowerCase() === 'e') {
      const now = Date.now();
      tapTimes = tapTimes.filter(t => now - t < 3000);
      tapTimes.push(now);
      if (tapTimes.length >= 10) { tapTimes = []; openPw('unlock'); }
    }
  }
});

// ── Password modal ──
let pwMode = 'unlock', changeStep = 1;

function openPw(mode) {
  pwMode = mode || 'unlock';
  setupNote.style.display = 'none';
  pwInput2Wrap.style.display = 'none';
  pwInput2.value = ''; pwInput.value = '';
  changeStep = 1;

  document.querySelector('.pw-label').textContent = pwMode === 'change' ? 'Change password' : 'Edit mode';
  pwSub.textContent   = pwMode === 'change' ? 'Enter your current password.' : 'Enter your password to unlock editing.';
  pwInput.placeholder = pwMode === 'change' ? 'Current password' : 'Password';
  pwGo.textContent    = pwMode === 'change' ? 'Next' : 'Unlock';

  pwOverlay.classList.add('open');
  setTimeout(() => pwInput.focus(), 150);
}
function closePw() {
  pwOverlay.classList.remove('open');
  pwInput.value = ''; pwInput2.value = '';
  pwInput2Wrap.style.display = 'none';
  setupNote.style.display = 'none';
  changeStep = 1;
}

function tryPw() {
  const cur = getPassword();
  if (pwMode === 'change') {
    if (changeStep === 1) {
      if (pwInput.value === cur) {
        changeStep = 2;
        pwInput2Wrap.style.display = 'block';
        pwInput.value = '';
        pwSub.textContent = 'Now enter your new password.';
        pwGo.textContent  = 'Save new password';
        setTimeout(() => pwInput2.focus(), 100);
      } else { shake(pwInput); }
    } else {
      const np = pwInput2.value.trim();
      if (np.length < 4) { shake(pwInput2); return; }
      setPassword(np); changeStep = 1; closePw();
      showToast('Password updated');
    }
  } else {
    if (pwInput.value === cur) {
      // check if credentials are set
      if (!hasCredentials()) {
        // show setup prompt
        pwSub.textContent = 'Password correct. Now connect your storage.';
        pwGo.style.display = 'none';
        setupNote.style.display = 'block';
      } else {
        closePw(); enterEdit();
      }
    } else { shake(pwInput); }
  }
}

function shake(el) {
  el.classList.add('err'); el.value = '';
  setTimeout(() => el.classList.remove('err'), 500);
}

pwGo.addEventListener('click', tryPw);
document.getElementById('pwDismiss').addEventListener('click', () => { pwGo.style.display = ''; closePw(); });
pwInput.addEventListener('keydown',  e => { if (e.key === 'Enter') tryPw(); });
pwInput2.addEventListener('keydown', e => { if (e.key === 'Enter') tryPw(); });

// ── JSONBin setup ──
document.getElementById('setupSave').addEventListener('click', async () => {
  const k = document.getElementById('setupKey').value.trim();
  const b = document.getElementById('setupBin').value.trim();
  if (!k || !b) return;
  saveCredentials(k, b);
  // push current defaults to the bin
  await pushData(siteData);
  pwGo.style.display = '';
  closePw();
  enterEdit();
  showToast('Storage connected!');
});

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Init ──
(async () => {
  let remote = null;
  if (hasCredentials()) {
    remote = await fetchData();
    if (!remote) {
      console.warn('JSONBin fetch returned nothing — using defaults');
      showToast('Could not load saved data');
    }
  }
  siteData = remote ? remote : JSON.parse(JSON.stringify(DEFAULTS));
  // always merge missing fields from defaults so site never breaks
  if (!siteData.name)    siteData.name    = DEFAULTS.name;
  if (!siteData.bio)     siteData.bio     = DEFAULTS.bio;
  if (!siteData.hobbies) siteData.hobbies = DEFAULTS.hobbies;
  render();
  const ls = document.getElementById('loadScreen');
  ls.classList.add('done');
  setTimeout(() => ls.remove(), 500);
})();
</script>
